# ERP Clinica Principal - Centro Medico San Fernando
# Nginx vhost para EC2 administrada como VPS.
# Dominios:
# - sanfernandocentromedico.com
# - www.sanfernandocentromedico.com
# - api.sanfernandocentromedico.com
# - intranet.sanfernandocentromedico.com
# - paciente.sanfernandocentromedico.com

server {
    listen 80;
    server_name sanfernandocentromedico.com www.sanfernandocentromedico.com;

    root /var/www/sanfernando/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name intranet.sanfernandocentromedico.com;

    root /var/www/sanfernando/intranet;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name paciente.sanfernandocentromedico.com;

    root /var/www/sanfernando/paciente;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name api.sanfernandocentromedico.com;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}