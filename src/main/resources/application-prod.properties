server.port=${SERVER_PORT:8085}

spring.application.name=backend-erp-clinica-san-fernando

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

spring.jackson.time-zone=America/Lima

logging.level.root=INFO
logging.level.com.sanfernando.erpclinica=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

server.forward-headers-strategy=framework

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4300,http://localhost:4200,http://127.0.0.1:4300,https://intranet.sanfernandocentromedico.com,https://paciente.sanfernandocentromedico.com,https://sanfernandocentromedico.com,https://www.sanfernandocentromedico.com}
