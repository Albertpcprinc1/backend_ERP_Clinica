spring.application.name=backend-erp-clinica

# ==========================================================
# SERVIDOR
# ==========================================================
server.port=${SERVER_PORT:8085}

# ==========================================================
# BASE DE DATOS POSTGRESQL
# Para entorno local usa los valores por defecto.
# Para produccion configurar variables de entorno:
# DB_URL, DB_USERNAME, DB_PASSWORD
# ==========================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/erp_clinica_principal}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================================
# JPA / HIBERNATE
# ==========================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================================
# FLYWAY
# ==========================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==========================================================
# JACKSON / JSON
# ==========================================================
spring.jackson.time-zone=America/Lima

# ==========================================================
# ENCODING
# ==========================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==========================================================
# LOGGING
# ==========================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG